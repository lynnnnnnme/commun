<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社区沙盘 - 最终修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        :root { --primary: #8DB5AA; --bg-page: #E8F1EE; --bg-stage: #F3EEEA; --text-main: #4A4A4A; --radius-lg: 35px; --radius-md: 22px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg-page); height: 100vh; width: 100vw; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; color: var(--text-main); display: flex; align-items: center; justify-content: center; }

        #tablet-stage {
            position: relative; height: 94vh; aspect-ratio: 3 / 4;
            background: var(--bg-stage); border-radius: var(--radius-lg); border: 10px solid white;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1); overflow: hidden;
        }

        .layer { position: absolute; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .hidden { display: none !important; }

        .input-box { width: 100%; padding: 18px; border-radius: var(--radius-md); border: 2px solid #F3F3F3; font-size: 1.1rem; text-align: center; margin: 30px 0; background: #FAFAFA; }
        .btn { background: var(--primary); color: white; padding: 18px 40px; border-radius: var(--radius-md); font-weight: 700; font-size: 1.05rem; border: none; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }

        .orb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; width: 100%; margin-top: 35px; }
        .orb { aspect-ratio: 1; border-radius: 50%; background: #F9FAFB; border: 2px solid #F0F0F0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #CCC; cursor: pointer; overflow: hidden; }
        .orb.done { border: 3px solid var(--primary); background: white; color: var(--primary); }
        .orb img { width: 85%; height: 85%; object-fit: contain; }

        .draw-modal { position: absolute; inset: 20px; background: white; border-radius: var(--radius-lg); display: none; flex-direction: column; z-index: 500; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .canvas-container { flex-grow: 1; background: #FBFBFB; border-radius: var(--radius-md); margin: 20px 0; border: 1px solid #F0F0F0; overflow: hidden; }
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* 同步按钮：精准在底座上方 */
        #sync-trigger {
            position: absolute; bottom: 125px; left: 50%; transform: translateX(-50%);
            z-index: 300; background: white; padding: 10px 25px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 700; color: var(--primary); border: 2.5px solid var(--primary);
            display: none; align-items: center; gap: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .inventory {
            position: absolute; left: 30px; right: 30px; bottom: 30px; height: 80px;
            display: none; align-items: center; gap: 15px; z-index: 200; overflow-x: auto; scrollbar-width: none;
        }
        .inv-item { width: 58px; height: 58px; background: white; border: 2.5px solid #EEE; border-radius: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .inv-item img { width: 45px; height: 45px; object-fit: contain; }

        .entity { position: absolute; width: 115px; height: 115px; cursor: move; touch-action: none; z-index: 10; }

        .loader-mask { position: absolute; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 5px solid #F0F0F0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="tablet-stage">
    <!-- 加载层 -->
    <div id="loading" class="loader-mask">
        <div class="spinner"></div>
        <p class="mt-4 font-black text-gray-400" id="loading-txt">正在同步画作...</p>
    </div>

    <!-- 同步按钮 -->
    <button id="sync-trigger" onclick="pullNeighborDrawings()">
        <i data-lucide="refresh-cw" size="16"></i> 同步邻居作品
    </button>

    <div id="sandbox-world"></div>

    <!-- 步骤 1 -->
    <div id="step-1" class="layer">
        <h1 class="text-2xl font-black mb-2">进入沙盘房间</h1>
        <p class="text-gray-400 text-sm">商量一个共同名字，两人填一样的</p>
        <input type="text" id="room-input" class="input-box" placeholder="例如：我们的秘密社区">
        <button id="btn-next" onclick="toStep2()" class="btn opacity-30 pointer-events-none">下一步</button>
    </div>

    <!-- 步骤 2 -->
    <div id="step-2" class="layer hidden">
        <h1 class="text-2xl font-black mb-2">选择您的分工</h1>
        <p class="text-gray-400 text-sm mb-6">两人必须选择不同的类别才能互传哦</p>
        <div class="flex flex-col gap-5 w-full">
            <button onclick="toList('nature')" class="btn !bg-[#AAB5AD] flex items-center justify-center gap-3"><i data-lucide="leaf"></i> 我负责：自然之物</button>
            <button onclick="toList('life')" class="btn flex items-center justify-center gap-3"><i data-lucide="home"></i> 我负责：人造之物</button>
        </div>
    </div>

    <!-- 步骤 3 -->
    <div id="step-3" class="layer hidden !justify-start">
        <div class="w-full flex justify-between items-end py-8 mb-6 border-b border-gray-100 px-2">
            <div class="text-left">
                <h2 id="room-view" class="font-black text-xl">基地: ---</h2>
                <span id="cat-view" class="text-xs font-bold text-[#8DB5AA]">正在绘制</span>
            </div>
            <button id="btn-launch" onclick="syncAndLaunch()" class="btn !w-auto !py-3 !px-8 !text-sm opacity-30 pointer-events-none">完成并进入</button>
        </div>
        <div id="orb-grid" class="orb-grid"></div>
        <p class="text-[0.7rem] text-gray-300 mt-10">💡 画好一个就可以同步进入沙盘了</p>
    </div>

    <!-- 画板 -->
    <div id="draw-modal" class="draw-modal">
        <div class="flex justify-between items-center mb-4">
            <button onclick="undo()" class="p-4 bg-gray-50 rounded-full"><i data-lucide="rotate-ccw" size="20"></i></button>
            <span id="draw-name" class="font-black text-gray-500">绘画中</span>
            <button onclick="saveDrawing()" class="btn !w-auto !p-4 !rounded-full"><i data-lucide="check" size="26"></i></button>
        </div>
        <div class="canvas-container"><canvas id="canvas"></canvas></div>
        <div class="flex flex-col gap-6 py-4">
            <input type="range" class="w-full h-3 rounded-full appearance-none bg-gradient-to-r from-red-400 via-green-400 to-blue-400" min="0" max="360" oninput="brush.h=this.value">
            <input type="range" class="w-full h-3 bg-gray-100 rounded-full appearance-none" min="3" max="25" value="10" oninput="brush.s=this.value">
        </div>
    </div>

    <div id="inventory-bar" class="inventory"></div>
</div>

<script>
    const IMGBB_KEY = '0056d6285eee4b643aec9131a7e53630'; 
    const KV_URL = 'https://kvdb.io/v3/CommunityV3_'; // 新的独立库

    const ITEMS = {
        nature: ["大树", "鲜花", "彩虹", "白云", "太阳", "蘑菇", "小草", "蝴蝶"],
        life: ["房子", "椅子", "路灯", "单车", "风车", "礼盒", "雨伞", "围栏"]
    };

    let state = { room: '', cat: '', myDraws: {}, neighborDraws: {}, active: '' };

    lucide.createIcons();
    
    document.getElementById('room-input').oninput = function() {
        const btn = document.getElementById('btn-next');
        if(this.value.trim().length > 1) btn.classList.remove('opacity-30', 'pointer-events-none');
        else btn.classList.add('opacity-30', 'pointer-events-none');
    };

    function toStep2() {
        state.room = document.getElementById('room-input').value.trim();
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        lucide.createIcons();
    }

    function toList(cat) {
        state.cat = cat;
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        document.getElementById('room-view').innerText = `基地: ${state.room}`;
        document.getElementById('cat-view').innerText = cat === 'nature' ? '负责：自然之物' : '负责：人造之物';
        
        const grid = document.getElementById('orb-grid');
        grid.innerHTML = '';
        ITEMS[cat].forEach(name => {
            const orb = document.createElement('div');
            orb.className = 'orb'; orb.id = `orb-${name}`; orb.innerText = name;
            orb.onclick = () => openCanvas(name);
            grid.appendChild(orb);
        });
        lucide.createIcons();
    }

    let brush = { h: 180, s: 10, active: false };
    let history = [];
    const cvs = document.getElementById('canvas');
    const ctx = cvs.getContext('2d');

    function openCanvas(name) {
        state.active = name;
        document.getElementById('draw-name').innerText = `创作：${name}`;
        document.getElementById('draw-modal').style.display = 'flex';
        const box = cvs.parentElement;
        cvs.width = box.clientWidth; cvs.height = box.clientHeight;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        history = [];
    }

    cvs.addEventListener('pointerdown', e => {
        history.push(ctx.getImageData(0,0,cvs.width,cvs.height));
        brush.active = true;
        const r = cvs.getBoundingClientRect();
        ctx.beginPath(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
    });
    cvs.addEventListener('pointermove', e => {
        if(!brush.active) return;
        const r = cvs.getBoundingClientRect();
        ctx.strokeStyle = `hsl(${brush.h}, 60%, 45%)`; ctx.lineWidth = brush.s;
        ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
    });
    cvs.addEventListener('pointerup', () => brush.active = false);

    function undo() { if(history.length) ctx.putImageData(history.pop(), 0, 0); }
    function saveDrawing() {
        state.myDraws[state.active] = cvs.toDataURL('image/png');
        const orb = document.getElementById(`orb-${state.active}`);
        orb.classList.add('done');
        orb.innerHTML = `<img src="${state.myDraws[state.active]}">`;
        document.getElementById('draw-modal').style.display = 'none';
        document.getElementById('btn-launch').classList.remove('opacity-30', 'pointer-events-none');
    }

    // --- 稳定同步逻辑 ---
    async function syncAndLaunch() {
        const loader = document.getElementById('loading');
        const txt = document.getElementById('loading-txt');
        loader.style.display = 'flex';

        try {
            let myUrls = {};
            const entries = Object.entries(state.myDraws);
            for(let i=0; i<entries.length; i++) {
                txt.innerText = `寄送画作 (${i+1}/${entries.length})`;
                const fd = new FormData();
                fd.append("image", entries[i][1].split(",")[1]);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                const json = await res.json();
                myUrls[entries[i][0]] = json.data.url;
            }

            // 发送到 KV 库，加入随机戳防止缓存
            const myKey = encodeURIComponent(state.room + "_" + state.cat);
            await fetch(KV_URL + myKey, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(myUrls)
            });

            enterSandbox();
            setTimeout(pullNeighborDrawings, 1000); // 延迟一点点读取，更稳定
        } catch (e) {
            alert("上传失败了，请检查网络后再试。");
        } finally { loader.style.display = 'none'; }
    }

    async function pullNeighborDrawings() {
        const otherCat = state.cat === 'nature' ? 'life' : 'nature';
        const otherKey = encodeURIComponent(state.room + "_" + otherCat);
        const trigger = document.getElementById('sync-trigger');
        
        trigger.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="16"></i> 正在连接邻居...`;
        lucide.createIcons();

        try {
            // 加入 cache: "no-cache" 确保拿到最新数据
            const res = await fetch(KV_URL + otherKey, { cache: "no-cache" });
            if(res.ok) {
                const data = await res.json();
                state.neighborDraws = data;
                updateInventory();
                trigger.innerHTML = `<i data-lucide="check" size="16"></i> 已同步邻居作品`;
            } else {
                trigger.innerHTML = `<i data-lucide="clock" size="16"></i> 邻居还没上传哦`;
            }
        } catch (e) {
            trigger.innerHTML = `<i data-lucide="refresh-cw" size="16"></i> 同步邻居作品`;
        }
        lucide.createIcons();
    }

    function enterSandbox() {
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('inventory-bar').style.display = 'flex';
        document.getElementById('sync-trigger').style.display = 'flex';
        updateInventory();
    }

    function updateInventory() {
        const bar = document.getElementById('inventory-bar');
        bar.innerHTML = '';
        // 合并我的（优先使用本地Base64，快）和邻居的
        const myItems = Object.entries(state.myDraws);
        const neighborItems = Object.entries(state.neighborDraws);
        
        [...myItems, ...neighborItems].forEach(([name, url]) => {
            const item = document.createElement('div');
            item.className = 'inv-item';
            item.innerHTML = `<img src="${url}">`;
            item.onclick = () => spawn(url);
            bar.appendChild(item);
        });
    }

    function spawn(url) {
        const img = document.createElement('img');
        img.src = url; img.className = 'entity';
        img.style.left = '35%'; img.style.top = '40%';
        img.dataset.scale = 1; img.dataset.rotate = 0;
        document.getElementById('sandbox-world').appendChild(img);
        attachGestures(img);
    }

    function attachGestures(el) {
        let active = {};
        let iDist = 0, iAngle = 0, sScale = 1, sRotate = 0;
        el.addEventListener('pointerdown', e => {
            e.preventDefault(); active[e.pointerId] = e;
            el.setPointerCapture(e.pointerId);
            if(Object.keys(active).length === 2) {
                const k = Object.keys(active);
                iDist = Math.hypot(active[k[0]].clientX - active[k[1]].clientX, active[k[0]].clientY - active[k[1]].clientY);
                iAngle = Math.atan2(active[k[1]].clientY - active[k[0]].clientY, active[k[1]].clientX - active[k[0]].clientX);
                sScale = parseFloat(el.dataset.scale); sRotate = parseFloat(el.dataset.rotate);
            }
        });
        el.addEventListener('pointermove', e => {
            if(!active[e.pointerId]) return;
            active[e.pointerId] = e;
            const k = Object.keys(active);
            if(k.length === 1) {
                const r = document.getElementById('tablet-stage').getBoundingClientRect();
                el.style.left = (e.clientX - r.left - 55) + 'px';
                el.style.top = (e.clientY - r.top - 55) + 'px';
            } else if(k.length === 2) {
                const curD = Math.hypot(active[k[0]].clientX - active[k[1]].clientX, active[k[0]].clientY - active[k[1]].clientY);
                const curA = Math.atan2(active[k[1]].clientY - active[k[0]].clientY, active[k[1]].clientX - active[k[0]].clientX);
                const nS = sScale * (curD / iDist);
                const nR = sRotate + (curA - iAngle) * (180 / Math.PI);
                el.dataset.scale = nS; el.dataset.rotate = nR;
                el.style.transform = `scale(${nS}) rotate(${nR}deg)`;
            }
        });
        el.addEventListener('pointerup', e => delete active[e.pointerId]);
    }
</script>
</body>
</html>
