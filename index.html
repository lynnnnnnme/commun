<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社区时光机 - 智慧联动终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Socket.io 客户端 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&family=Klee+One:wght@600&display=swap');
        :root { 
            --primary-green: #8DB5AA; --bg-single: #FDFBF7; --bg-double: #EAE4DD; 
            --pink: #FFADAD; --blue: #A0C4FF; --green: #CAFFBF; --yellow: #FDFFB6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #E8F1EE; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; color: #525252; }

        /* 外观：精致白框 4:3 容器 */
        #main-stage {
            position: relative; width: 92vw; height: 95vh; max-width: 550px;
            background: var(--bg-single); border-radius: 45px;
            border: 10px solid white; box-shadow: 0 40px 100px rgba(141, 181, 170, 0.12);
            overflow: hidden; display: flex; flex-direction: column; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .active-view { display: flex !important; }

        /* 右上角保底切换 */
        #manual-toggle {
            position: absolute; top: 25px; right: 25px; z-index: 2000;
            width: 44px; height: 44px; background: rgba(255,255,255,0.7);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary-green);
        }

        /* 8:3 延伸视角逻辑 */
        #game-runtime { position: absolute; inset: 0; z-index: 1000; display: none; background: white; }
        #view-port { width: 100%; height: 100%; overflow: hidden; position: relative; }
        #game-frame { border: none; position: absolute; left: 0; width: 100%; transition: none; }

        .is-single #game-frame { height: 100%; top: 0; }
        .is-double.side-top #game-frame { height: 200%; top: 0; transform: rotate(180deg); } 
        .is-double.side-bottom #game-frame { height: 200%; top: -100%; }

        .color-card {
            width: 100%; max-width: 260px; padding: 22px; border-radius: 28px;
            margin-bottom: 15px; background: white; box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }

        .btn-ready { background: var(--primary-green); color: white; padding: 14px 45px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 初始化层 -->
    <div id="init-layer" class="fixed inset-0 bg-[#E8F1EE] z-[9000] flex flex-col items-center justify-center">
        <div class="mb-8 text-[#8DB5AA] animate-pulse"><i data-lucide="power" size="52"></i></div>
        <button onclick="bootSystem()" class="btn-ready">点击开启智慧终端</button>
    </div>

    <!-- 位置层 -->
    <div id="side-select-layer" class="fixed inset-0 bg-[#E8F1EE] z-[8500] hidden flex flex-col items-center justify-center">
        <h2 class="text-lg font-black mb-10 text-stone-500">确认屏幕物理位置</h2>
        <div class="flex flex-col gap-5 w-64">
            <button onclick="saveSide('top')" class="btn-ready">上半屏 (P2侧)</button>
            <button onclick="saveSide('bottom')" class="btn-ready" style="background:#7B8A8E">下半屏 (P1侧)</button>
        </div>
    </div>

    <div id="main-stage">
        <div id="manual-toggle" onclick="toggleModeManual()"><i data-lucide="refresh-cw"></i></div>

        <!-- 单人 -->
        <div id="view-single" class="view-section active-view">
            <h2 class="font-black mb-8 text-stone-300 tracking-[0.2em] text-[0.6rem] uppercase">Personal Mode</h2>
            <div class="color-card" onclick="launch('single-htp')" style="border-bottom: 5px solid var(--pink)">
                <p class="font-black text-sm">房树人心理绘测</p>
            </div>
            <div class="color-card" onclick="launch('single-book')" style="border-bottom: 5px solid var(--blue)">
                <p class="font-black text-sm">社区答案之书</p>
            </div>
        </div>

        <!-- 双人 (暗底色) -->
        <div id="view-double" class="view-section">
            <h2 class="font-black mb-8 text-stone-400 tracking-[0.2em] text-[0.6rem] uppercase">Cooperation Space</h2>
            <div class="color-card" onclick="launchDouble('double-sand')" style="border-bottom: 5px solid var(--yellow)">
                <p class="font-black text-sm">共同创作沙盘</p>
            </div>
            <div class="color-card" onclick="launchDouble('double-cards')" style="border-bottom: 5px solid var(--green)">
                <p class="font-black text-sm">凑十记忆挑战</p>
            </div>
        </div>

        <div id="game-runtime">
            <div id="view-port"><iframe id="game-frame" src=""></iframe></div>
            <button class="absolute top-4 left-4 bg-white/80 p-2 rounded-full shadow-md z-[2001]" onclick="exitGame()">
                <i data-lucide="chevron-left" size="20" color="#8DB5AA"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 【重要】将此处修改为您电脑的真实局域网 IP 地址
        const SERVER_URL = "http://192.168.x.x:3000"; 
        let socket = null;
        let mySide = localStorage.getItem('tm_side');
        let currentMode = 'single', isRunning = false;

        function bootSystem() {
            document.getElementById('init-layer').style.display = 'none';
            if (!mySide) document.getElementById('side-select-layer').style.display = 'flex';
            else initSensors();
        }

        function saveSide(side) {
            localStorage.setItem('tm_side', side);
            mySide = side;
            document.getElementById('side-select-layer').style.display = 'none';
            initSensors();
        }

        async function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
            }
            window.addEventListener('deviceorientation', (e) => {
                if (isRunning) return;
                const b = Math.abs(e.beta), g = Math.abs(e.gamma);
                if (b < 15 && g < 15) setMode('double');
                else if (b > 35) setMode('single');
            });
            updateUI();
        }

        function setMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            updateUI();
        }

        function toggleModeManual() {
            if (isRunning) return;
            setMode(currentMode === 'single' ? 'double' : 'single');
        }

        function updateUI() {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active-view'));
            const stage = document.getElementById('main-stage');
            if (currentMode === 'single') {
                stage.style.background = "var(--bg-single)";
                document.getElementById('view-single').classList.add('active-view');
            } else {
                stage.style.background = "var(--bg-double)";
                document.getElementById('view-double').classList.add('active-view');
            }
            document.getElementById('manual-toggle').style.display = isRunning ? 'none' : 'flex';
        }

        // --- 核心：建立 WebSocket 连接 ---
        function launchDouble(gameId) {
            if(!socket) {
                socket = io(SERVER_URL);
                socket.on('control', (data) => {
                    if(data.type === 'LAUNCH') doLaunch(data.gameId);
                    if(data.type === 'EXIT') doExit();
                });
                socket.on('sync_action', (data) => {
                    document.getElementById('game-frame').contentWindow.postMessage({ type: 'APPLY_SYNC', data: data }, '*');
                });
            }
            socket.emit('control', { type: 'LAUNCH', gameId: gameId });
            doLaunch(gameId);
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'GAME_SYNC' && socket) socket.emit('sync_action', e.data.payload);
        });

        function launch(id) { doLaunch(id); }

        function doLaunch(id) {
            isRunning = true;
            const frame = document.getElementById('game-frame');
            const port = document.getElementById('view-port');
            frame.src = id + '.html'; 
            document.getElementById('game-runtime').style.display = 'block';
            port.className = (id.includes('double') ? 'is-double ' : 'is-single ') + `side-${mySide}`;
        }

        function exitGame() {
            if (socket) socket.emit('control', { type: 'EXIT' });
            doExit();
        }

        function doExit() {
            isRunning = false;
            document.getElementById('game-runtime').style.display = 'none';
            document.getElementById('game-frame').src = "";
            if(socket) { socket.disconnect(); socket = null; }
            updateUI();
        }
    </script>
</body>
</html>
