<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社区棋牌 - 记忆对战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&family=Klee+One:wght@600&display=swap');

        /* 定义全局变量，杜绝纯黑 */
        :root {
            --primary-green: #8DB5AA;
            --light-green: #D2E0DB;
            --dark-text: #3D4443;
            --soft-beige: #F3EEEA;
            --card-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: #E8F1EE; height: 100vh; width: 100vw; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; font-family: 'Noto Sans SC', sans-serif; 
            color: var(--dark-text);
        }

        /* 3:8 竖向容器 */
        #tablet-stage {
            position: relative;
            height: 96vh; aspect-ratio: 3 / 8;
            background: var(--card-white); border-radius: 45px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            padding: 10px; display: flex; flex-direction: column; gap: 10px;
        }

        /* 玩家操作区 */
        .player-zone {
            height: 25%; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; border-radius: 30px; z-index: 100;
        }

        /* 弹窗样式 */
        .local-intro, .local-end {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 200; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .local-end { display: none; z-index: 300; }

        /* 抢牌按钮：森系绿 */
        .attack-btn {
            width: 85%; height: 75px; 
            background: var(--primary-green);
            border-radius: 28px;
            color: #FFFFFF; font-weight: 900; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(141, 181, 170, 0.25);
            transition: all 0.1s ease;
        }
        .attack-btn:active { transform: translateY(3px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 键盘面板：稳定布局 */
        .num-pad {
            position: absolute; inset: 0; 
            background: rgba(255, 255, 255, 0.98);
            display: none; flex-direction: column; 
            padding: 12px; border-radius: 30px; z-index: 150;
        }
        .input-display-box {
            height: 38px; width: 100%; background: var(--soft-beige);
            border-radius: 12px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center;
            color: rgba(61, 68, 67, 0.5); /* 低透明度文字 */
            font-weight: 900; font-size: 0.9rem;
        }
        .num-pad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex: 1; }
        .num-btn {
            background: var(--soft-beige); border: none; border-radius: 14px;
            font-size: 1.2rem; font-weight: 900; color: var(--dark-text);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .num-btn:active { background: #E5E1DE; }
        .num-btn.confirm { background: #F57D7D; color: #FFF; grid-column: span 2; }

        /* 棋盘 */
        #game-board { flex: 1; background: var(--soft-beige); border-radius: 35px; position: relative; overflow: hidden; }
        #board-lock {
            position: absolute; inset: 0; z-index: 50; 
            background: rgba(243, 238, 234, 0.4); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center;
            pointer-events: none;
        }

        /* 计时器：绿系 */
        #timer-box {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            height: 100px; width: 6px; background: var(--primary-green);
            border-radius: 0 10px 10px 0; z-index: 60;
        }
        #timer-val {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%) rotate(180deg);
            font-size: 1.1rem; font-weight: 900; color: var(--primary-green);
            writing-mode: vertical-rl;
        }

        /* 文案样式 */
        .rule-main { font-size: 0.9rem; color: var(--dark-text); font-weight: 900; line-height: 1.6; }
        .rule-math { font-family: 'Klee One'; color: #F57D7D; font-size: 0.85rem; background: #FFF5F5; padding: 4px 10px; border-radius: 8px; margin: 10px 0; }
        
        /* 按钮通用样式：加入游戏 */
        .start-btn { 
            background: var(--primary-green); color: #FFF; padding: 12px 35px; 
            border-radius: 50px; font-size: 0.85rem; font-weight: 900; cursor: pointer;
            transition: all 0.3s; border: none;
        }
        /* 等待邻居状态：变浅 */
        .start-btn.is-waiting { 
            background: var(--light-green); 
            color: rgba(61, 68, 67, 0.4);
            cursor: default;
        }

        /* 修改后的再来一局按钮：与加入游戏颜色一致 */
        .restart-btn { 
            background: var(--primary-green); color: #FFF; padding: 12px 35px; 
            border-radius: 50px; font-size: 0.85rem; font-weight: 900; cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(141, 181, 170, 0.2);
        }
        .restart-btn:active { transform: translateY(2px); }

        .flipped { transform: rotate(180deg); }

        /* 卡牌：彩色保留 */
        .card {
            position: absolute; width: 55px; height: 82px;
            background: white; border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 10px; transition: all 0.4s;
            border: 1px solid rgba(255,255,255,0.7);
        }
        .card-num { font-family: 'Klee One', serif; font-size: 1.4rem; font-weight: 900; line-height: 1; color: var(--dark-text); }
        .num-p2 { transform: rotate(180deg); text-align: left; }
        .num-p1 { text-align: right; }
    </style>
</head>
<body>

    <div id="tablet-stage">
        
        <!-- P2 操作区 -->
        <div class="player-zone flipped">
            <!-- P2 引导 -->
            <div id="intro-p2" class="local-intro">
                <p class="rule-main">观察棋盘，记住数字组合</p>
                <div class="rule-math">相加等于 10 即可得分</div>
                <p class="text-[0.75rem] text-stone-400 mb-6 font-bold">如 8+2=10 | 4+5+1=10</p>
                <button onclick="playerReady('p2')" class="start-btn" id="btn-ready-p2">加入游戏</button>
            </div>
            <!-- P2 结算 -->
            <div id="end-p2" class="local-end">
                <p class="text-xs font-black text-stone-400 mb-2 uppercase tracking-widest">游戏结束</p>
                <h2 id="res-txt-p2" class="text-3xl font-black text-[#444] mb-8">胜负已定</h2>
                <button onclick="location.reload()" class="restart-btn">再来一局</button>
            </div>

            <div id="score-p2" class="text-3xl font-black text-[#444] mb-3">0</div>
            <button class="attack-btn" id="atk-p2" onclick="startAttack('p2')">我发现了</button>
            
            <div class="num-pad" id="pad-p2">
                <div id="hint-p2" class="input-display-box">等待输入</div>
                <div class="num-pad-grid">
                    <button class="num-btn" onclick="inputNum(1)">1</button><button class="num-btn" onclick="inputNum(2)">2</button><button class="num-btn" onclick="inputNum(3)">3</button>
                    <button class="num-btn" onclick="inputNum(4)">4</button><button class="num-btn" onclick="inputNum(5)">5</button><button class="num-btn" onclick="inputNum(6)">6</button>
                    <button class="num-btn" onclick="inputNum(7)">7</button><button class="num-btn" onclick="inputNum(8)">8</button><button class="num-btn" onclick="inputNum(9)">9</button>
                    <button class="num-btn bg-stone-200" onclick="clearInput()">清</button>
                    <button class="num-btn confirm" onclick="submitInput()">确认</button>
                </div>
            </div>
        </div>

        <!-- 棋盘区 -->
        <div id="game-board">
            <div id="board-lock"></div>
            <div id="timer-box"></div>
            <div id="timer-val">120</div>
            <div id="deck" class="w-full h-full relative"></div>
        </div>

        <!-- P1 操作区 -->
        <div class="player-zone">
            <!-- P1 引导 -->
            <div id="intro-p1" class="local-intro">
                <p class="rule-main">观察棋盘，记住数字组合</p>
                <div class="rule-math">相加等于 10 即可得分</div>
                <p class="text-[0.75rem] text-stone-400 mb-6 font-bold">如 8+2=10 | 4+5+1=10</p>
                <button onclick="playerReady('p1')" class="start-btn" id="btn-ready-p1">加入游戏</button>
            </div>
            <!-- P1 结算 -->
            <div id="end-p1" class="local-end">
                <p class="text-xs font-black text-stone-400 mb-2 uppercase tracking-widest">游戏结束</p>
                <h2 id="res-txt-p1" class="text-3xl font-black text-[#444] mb-8">胜负已定</h2>
                <button onclick="location.reload()" class="restart-btn">再来一局</button>
            </div>

            <div id="score-p1" class="text-3xl font-black text-[#444] mb-3">0</div>
            <button class="attack-btn" id="atk-p1" onclick="startAttack('p1')">我发现了</button>

            <div class="num-pad" id="pad-p1">
                <div id="hint-p1" class="input-display-box">等待输入</div>
                <div class="num-pad-grid">
                    <button class="num-btn" onclick="inputNum(1)">1</button><button class="num-btn" onclick="inputNum(2)">2</button><button class="num-btn" onclick="inputNum(3)">3</button>
                    <button class="num-btn" onclick="inputNum(4)">4</button><button class="num-btn" onclick="inputNum(5)">5</button><button class="num-btn" onclick="inputNum(6)">6</button>
                    <button class="num-btn" onclick="inputNum(7)">7</button><button class="num-btn" onclick="inputNum(8)">8</button><button class="num-btn" onclick="inputNum(9)">9</button>
                    <button class="num-btn bg-stone-200" onclick="clearInput()">清</button>
                    <button class="num-btn confirm" onclick="submitInput()">确认</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const COLORS = ["#F5D1D1", "#B8E4D5", "#D8B4FE", "#F9E2AF", "#BAE2FF"];
        let state = {
            active: false,
            scores: {p1: 0, p2: 0},
            timeLeft: 120,
            attacker: null,
            inputStack: [],
            boardCards: [],
            p1Ready: false, p2Ready: false
        };

        function playerReady(p) {
            if(state[p+'Ready']) return; 
            
            state[p+'Ready'] = true;
            const btn = document.getElementById('btn-ready-'+p);
            btn.innerText = "等待邻居...";
            btn.classList.add('is-waiting');
            
            if(state.p1Ready && state.p2Ready) {
                setTimeout(() => {
                    document.getElementById('intro-p1').style.display = 'none';
                    document.getElementById('intro-p2').style.display = 'none';
                    activateGame();
                }, 600);
            }
        }

        function activateGame() {
            state.active = true;
            setInterval(() => {
                if(state.active && state.timeLeft > 0) {
                    state.timeLeft--;
                    document.getElementById('timer-val').innerText = state.timeLeft;
                    if(state.timeLeft <= 0) endGame();
                }
            }, 1000);
            setInterval(spawn, 1900);
            spawn(); 
        }

        function spawn() {
            if(!state.active || state.attacker) return;
            if(state.boardCards.length >= 10) {
                const oldest = state.boardCards.shift();
                oldest.el.style.transform = "scale(0) rotate(-15deg)";
                oldest.el.style.opacity = "0";
                setTimeout(() => oldest.el.remove(), 500);
            }
            const val = Math.floor(Math.random() * 9) + 1;
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `<div class="card-num num-p2">${val}</div><div class="card-num num-p1">${val}</div>`;
            el.style.backgroundColor = COLORS[Math.floor(Math.random()*COLORS.length)];
            const board = document.getElementById('game-board');
            const x = 15 + Math.random() * (board.clientWidth - 85);
            const y = 20 + Math.random() * (board.clientHeight - 95);
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.style.transform = `rotate(${(Math.random()-0.5)*40}deg) scale(0)`;
            const cardObj = { id: Math.random(), val, el };
            document.getElementById('deck').appendChild(el);
            state.boardCards.push(cardObj);
            setTimeout(() => el.style.transform = el.style.transform.replace('scale(0)', 'scale(1)'), 50);
        }

        function startAttack(p) {
            if(!state.active || state.attacker) return;
            state.attacker = p;
            state.inputStack = [];
            document.getElementById('board-lock').style.display = 'flex';
            document.getElementById('pad-' + p).style.display = 'flex';
            document.getElementById('atk-' + (p==='p1'?'p2':'p1')).style.visibility = 'hidden';
            updateHint();
        }

        function inputNum(n) {
            if(state.inputStack.length < 4) {
                state.inputStack.push(n);
                updateHint();
            }
        }

        function clearInput() { state.inputStack = []; updateHint(); }

        function updateHint() {
            const h = document.getElementById('hint-' + state.attacker);
            h.innerText = state.inputStack.length > 0 ? state.inputStack.join(' + ') : "等待输入";
        }

        function submitInput() {
            const sum = state.inputStack.reduce((a, b) => a + b, 0);
            const p = state.attacker;
            let tempBoard = state.boardCards.map(c => c.val);
            let valid = true;
            state.inputStack.forEach(n => {
                const i = tempBoard.indexOf(n);
                if(i > -1) tempBoard.splice(i, 1);
                else valid = false;
            });
            if(sum === 10 && valid && state.inputStack.length > 0) {
                state.scores[p] += 1;
                state.inputStack.forEach(num => {
                    const idx = state.boardCards.findIndex(c => c.val === num);
                    if(idx > -1) {
                        const card = state.boardCards[idx];
                        card.el.style.transform = "scale(0) rotate(45deg)";
                        state.boardCards.splice(idx, 1);
                        setTimeout(() => card.el.remove(), 400);
                    }
                });
            } else {
                state.scores[p] -= 1;
                if(state.scores[p] < 0) state.scores[p] = 0;
            }
            document.getElementById('score-'+p).innerText = state.scores[p];
            document.getElementById('board-lock').style.display = 'none';
            document.getElementById('pad-' + p).style.display = 'none';
            document.getElementById('atk-p1').style.visibility = 'visible';
            document.getElementById('atk-p2').style.visibility = 'visible';
            state.attacker = null;
        }

        function endGame() {
            state.active = false;
            const p1Final = state.scores.p1;
            const p2Final = state.scores.p2;
            const resP1 = document.getElementById('res-txt-p1');
            const resP2 = document.getElementById('res-txt-p2');
            if (p1Final > p2Final) {
                resP1.innerText = "胜利！";
                resP2.innerText = "遗憾落败";
            } else if (p2Final > p1Final) {
                resP1.innerText = "遗憾落败";
                resP2.innerText = "胜利！";
            } else {
                resP1.innerText = "平局";
                resP2.innerText = "平局";
            }
            document.getElementById('end-p1').style.display = 'flex';
            document.getElementById('end-p2').style.display = 'flex';
        }
    </script>
</body>
</html>
